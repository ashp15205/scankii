# Credential detection patterns for scankii.
# Each entry defines a regex used to identify credential-like values or accessors.

- id: openai-api-key
  name: OpenAI API Key
  pattern: 'sk-[A-Za-z0-9_-]{20,}'
  severity: HIGH
  examples:
    - sk-proj-abc123def456ghi789jkl012mno345
    - sk-1234567890abcdefghijklmnopqrstuv


- id: groq-api-key
  name: Groq API Key
  pattern: 'gsk_[A-Za-z0-9]{20,}'
  severity: HIGH
  examples:
    - gsk_abcdefghijklmnopqrstuvwxyz123456
    - gsk_7f3a9b2c1d4e5f6a8b0c2d4e6f8a0b2c

- id: aws-iam-key
  name: AWS IAM Access Key
  pattern: 'AKIA[0-9A-Z]{16}'
  severity: HIGH
  examples:
    - AKIAIOSFODNN7EXAMPLE
    - AKIA4G7EXAMPLEKEY12

- id: github-pat
  name: GitHub Personal Access Token
  pattern: 'ghp_[A-Za-z0-9]{36,}'
  severity: HIGH
  examples:
    - ghp_1234567890abcdefghijklmnopqrstuvwxyz1234
    - ghp_abcdefghijklmnopqrstuvwxyz1234567890ABCD

- id: google-api-key
  name: Google API Key
  pattern: 'AIza[A-Za-z0-9_-]{35}'
  severity: HIGH
  examples:
    - AIzaSyDaIvP0bLMO42ECW233IqJ_4o-0JhYQSl4
    - AIzaSyD-example-key-for-testing-purposes12

- id: slack-bot-token
  name: Slack Bot Token
  pattern: 'xoxb-[0-9]+-[0-9]+-[A-Za-z0-9]+'
  severity: HIGH
  examples:
    - dummy-slack-token-example-1
    - dummy-slack-token-example-2

- id: generic-api-key-var
  name: Generic API Key Variable Name
  pattern: '(?i)\b(?:api[_-]?key|apikey|api[_-]?token)\b'
  severity: MEDIUM
  examples:
    - API_KEY
    - api_key
    - apiKey
    - apiToken

- id: generic-secret-var
  name: Generic Secret Variable Name
  pattern: '(?i)\b(?:secret|client[_-]?secret)\b'
  severity: MEDIUM
  examples:
    - SECRET
    - client_secret
    - secret_key

- id: generic-token-var
  name: Generic Token Variable Name
  pattern: '(?i)\b(?:access[_-]?token|auth[_-]?token|token|appid|auth|credentials|client[_-]?id|oauth)\b'
  severity: MEDIUM
  examples:
    - TOKEN
    - access_token
    - authToken
    - appid
    - credentials

- id: generic-password-var
  name: Generic Password Variable Name
  pattern: '(?i)\b(?:password|passwd|pwd)\b'
  severity: MEDIUM
  examples:
    - PASSWORD
    - db_password
    - passwd

- id: generic-private-key-var
  name: Generic Private Key Variable Name
  pattern: '(?i)\b(?:private[_-]?key|priv[_-]?key)\b'
  severity: MEDIUM
  examples:
    - PRIVATE_KEY
    - private_key
    - privKey

- id: mongodb-connection-string
  name: MongoDB Connection String
  pattern: 'mongodb(\+srv)?://[^\s''"]+'
  severity: HIGH
  examples:
    - mongodb://user:pass@localhost:27017/mydb
    - mongodb+srv://admin:secret@cluster0.example.mongodb.net/db

- id: postgres-connection-string
  name: PostgreSQL Connection String
  pattern: 'postgres(ql)?://[^\s''"]+'
  severity: HIGH
  examples:
    - postgres://user:password@localhost:5432/mydb
    - postgresql://admin:secret@db.example.com:5432/production

- id: mysql-connection-string
  name: MySQL Connection String
  pattern: 'mysql://[^\s''"]+'
  severity: HIGH
  examples:
    - mysql://root:password@localhost:3306/app
    - mysql://admin:secret@db.example.com:3306/users

- id: rsa-private-key
  name: RSA Private Key Block
  pattern: '-----BEGIN RSA PRIVATE KEY-----'
  severity: CRITICAL
  examples:
    - '-----BEGIN RSA PRIVATE KEY-----'
    - '-----BEGIN RSA PRIVATE KEY-----\nMIIEpAIBAAKCAQEA...'

- id: ec-private-key
  name: EC Private Key Block
  pattern: '-----BEGIN EC PRIVATE KEY-----'
  severity: CRITICAL
  examples:
    - '-----BEGIN EC PRIVATE KEY-----'
    - '-----BEGIN EC PRIVATE KEY-----\nMHcCAQEEI...'

- id: python-os-environ
  name: Python Environment Variable Access
  pattern: 'os\.environ(?:\[|\.)'
  severity: LOW
  examples:
    - os.environ[
    - os.environ.get(
    - os.environ.

- id: javascript-process-env
  name: JavaScript Environment Variable Access
  pattern: 'process\.env(?:\.|\[)'
  severity: LOW
  examples:
    - process.env.
    - process.env[
    - process.env.API_KEY
